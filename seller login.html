<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Login</title>
    <link rel="stylesheet" href="seller login.css">
</head>

<body>
    <div class="flip-container" id="flipContainer">
        <div class="flipper">
            <!-- FRONT: LOGIN -->
            <div class="front login-box">
                <button class="back-btn" onclick="goBack()">✕</button>
                <h2>Seller Login</h2>
                <input type="text" id="loginUser" placeholder="Username" autocomplete="off">
                <input type="password" id="loginPass" placeholder="Password" autocomplete="off">
                <button onclick="login()">Login</button>
                <div class="separator"></div>
                <p>No account? <a href="#" onclick="flipToRegister()">Register here</a></p>
            </div>
            <!-- BACK: REGISTER -->
            <div class="back login-box">
                <button class="back-btn" onclick="flipToLogin()">✕</button>
                <h2>Register</h2>
                <input type="text" id="newUser" placeholder="Username" autocomplete="off">
                <input type="password" id="newPass" placeholder="Password" autocomplete="off">
                <input type="text" id="newShopName" placeholder="Shop Name" autocomplete="off">
                <label class="file-label" for="profilePic">Store Profile Picture</label>
                <input type="file" id="profilePic" accept="image/*">
                <img id="preview" src="" alt="Preview">
                <button onclick="register()">Register</button>
                <div class="separator"></div>
                <p>Already have an account? <a href="#" onclick="flipToLogin()">Login here</a></p>
            </div>
        </div>
    </div>
    <script>
        function flipToRegister() {
            document.getElementById("flipContainer").classList.add("flipped");
        }

        function flipToLogin() {
            document.getElementById("flipContainer").classList.remove("flipped");
        }

        function goBack() {
            window.location.href = "index.html";
        }
        document.getElementById("profilePic").addEventListener("change", function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById("preview");
                    preview.src = e.target.result;
                    preview.style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        });

        function login() {
            const sellers = JSON.parse(localStorage.getItem("sellers")) || [];
            const username = document.getElementById("loginUser").value.trim();
            const password = document.getElementById("loginPass").value.trim();
            if (!username || !password) {
                alert("Please enter your username and password.");
                return;
            }
            const seller = sellers.find(s => s.username === username && s.password === password);
            if (seller) {
                localStorage.setItem("currentSeller", username);
                window.location.href = "homeseller.html";
            } else {
                alert("Invalid Account! Please register first.");
            }
        }

        function register() {
            const sellers = JSON.parse(localStorage.getItem("sellers")) || [];
            const username = document.getElementById("newUser").value.trim();
            const password = document.getElementById("newPass").value.trim();
            const shopName = document.getElementById("newShopName").value.trim();
            const imageFile = document.getElementById("profilePic").files[0];
            if (!username || !password || !shopName) {
                alert("Please fill in all fields.");
                return;
            }
            if (!imageFile) {
                alert("Please upload a store profile picture.");
                return;
            }
            const exists = sellers.find(s => s.username === username);
            if (exists) {
                alert("Username already taken. Please choose another.");
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const profilePic = e.target.result;
                // Save seller account
                sellers.push({
                    username,
                    password,
                    profilePic
                });
                localStorage.setItem("sellers", JSON.stringify(sellers));
                // Save to registeredSellers
                let registeredSellers = JSON.parse(localStorage.getItem("registeredSellers")) || [];
                registeredSellers.push(username);
                localStorage.setItem("registeredSellers", JSON.stringify(registeredSellers));
                // Auto-create store using shop name (not username)
                let stores = JSON.parse(localStorage.getItem("stores")) || [];
                stores.push({
                    name: shopName,
                    photo: profilePic,
                    location: "Local Store",
                    seller: username
                });
                localStorage.setItem("stores", JSON.stringify(stores));
                alert("Registered Successfully! Your store is now live. You can now login.");
                flipToLogin();
                document.getElementById("newUser").value = "";
                document.getElementById("newPass").value = "";
                document.getElementById("newShopName").value = "";
                document.getElementById("profilePic").value = "";
                document.getElementById("preview").style.display = "none";
            };
            reader.readAsDataURL(imageFile);
        }

    </script>
</body>

</html>
