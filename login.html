<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="flip-container" id="flipContainer">
        <div class="flipper">
            <!-- FRONT: LOGIN -->
            <div class="front">
                <button class="back-btn" onclick="goBack()">✕</button>
                <h2>Customer Login</h2>
                <input type="text" id="loginUser" placeholder="Username" autocomplete="off">
                <input type="password" id="password" placeholder="Password" autocomplete="off">
                <button onclick="login()">Login</button>
                <div class="separator"></div>
                <p>No account? <a href="#" onclick="flipToRegister()">Sign Up</a></p>
            </div>
            <!-- BACK: REGISTER -->
            <div class="back">
                <button class="back-btn" onclick="flipToLogin()">✕</button>
                <h2>Create Account</h2>
                <input type="text" id="newUser" placeholder="Username" autocomplete="off">
                <input type="password" id="newPass" placeholder="Password" autocomplete="off">
                <label class="file-label" for="profilePic">Profile Picture</label>
                <input type="file" id="profilePic" accept="image/*">
                <img id="preview" src="" alt="Preview">
                <button onclick="register()">Sign Up</button>
                <div class="separator"></div>
                <p>Already have an account? <a href="#" onclick="flipToLogin()">Login here</a></p>
            </div>
        </div>
    </div>
    <script>
        function flipToRegister() {
            document.getElementById("flipContainer").classList.add("flipped");
        }

        function flipToLogin() {
            document.getElementById("flipContainer").classList.remove("flipped");
        }

        function goBack() {
            window.location.href = "index.html";
        }
        document.getElementById("profilePic").addEventListener("change", function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById("preview");
                    preview.src = e.target.result;
                    preview.style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        });

        function login() {
            const customers = JSON.parse(localStorage.getItem("customers")) || [];
            const username = document.getElementById("loginUser").value.trim();
            const password = document.getElementById("password").value.trim();
            if (!username || !password) {
                alert("Please enter your username and password.");
                return;
            }
            const customer = customers.find(c => c.username === username && c.password === password);
            if (customer) {
                localStorage.setItem("currentCustomer", customer.username);
                window.location.href = "foruzer.html";
            } else {
                alert("Invalid Account! Please sign up first if you don't have an account.");
            }
        }

        function register() {
            const customers = JSON.parse(localStorage.getItem("customers")) || [];
            const username = document.getElementById("newUser").value.trim();
            const password = document.getElementById("newPass").value.trim();
            const imageFile = document.getElementById("profilePic").files[0];
            if (!username || !password) {
                alert("Please fill in all fields.");
                return;
            }
            if (!imageFile) {
                alert("Please upload a profile picture.");
                return;
            }
            const exists = customers.find(c => c.username === username);
            if (exists) {
                alert("Username already taken. Please choose another.");
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                customers.push({
                    username,
                    password,
                    profilePic: e.target.result
                });
                localStorage.setItem("customers", JSON.stringify(customers));
                alert("Registered Successfully! You can now login.");
                flipToLogin();
                document.getElementById("newUser").value = "";
                document.getElementById("newPass").value = "";
                document.getElementById("profilePic").value = "";
                document.getElementById("preview").style.display = "none";
            };
            reader.readAsDataURL(imageFile);
        }

    </script>
</body>

</html>
