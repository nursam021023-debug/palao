<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Customer</title>
    <link rel="stylesheet" href="messages.css">
</head>

<body>
    <div class="app">
        <!-- HEADER -->
        <div class="top-bar">
            <button class="back-btn" onclick="goBack()">&#8592; Back</button>
            <h2>Messages</h2>
            <span id="customer-label"></span>
        </div>
        <div class="main">
            <!-- SIDEBAR: store list -->
            <div class="sidebar">
                <div class="sidebar-header">Stores</div>
                <div id="contact-list"></div>
            </div>
            <!-- CHAT AREA -->
            <div class="chat-area" id="chat-area">
                <div class="no-chat">Select a store to message</div>
            </div>
        </div>
    </div>
    <script>
        const currentCustomer = localStorage.getItem("currentCustomer");
        if (!currentCustomer) {
            alert("Please login first.");
            window.location.href = "login.html";
        }
        document.getElementById("customer-label").innerText = currentCustomer;
        let activeStore = null;
        // Load all stores
        function getStores() {
            return JSON.parse(localStorage.getItem("stores")) || [];
        }

        function getUnread(sellerUsername) {
            const all = JSON.parse(localStorage.getItem("messages")) || [];
            return all.filter(m => m.seller === sellerUsername && m.customer === currentCustomer && m.from === "seller" && !m.read).length;
        }

        function getLastMsg(sellerUsername) {
            const all = JSON.parse(localStorage.getItem("messages")) || [];
            const msgs = all.filter(m => m.seller === sellerUsername && m.customer === currentCustomer);
            return msgs.length ? msgs[msgs.length - 1] : null;
        }

        function renderSidebar() {
            const stores = getStores();
            const list = document.getElementById("contact-list");
            list.innerHTML = "";
            if (stores.length === 0) {
                list.innerHTML = "<div class='empty-sidebar'>No stores available</div>";
                return;
            }
            stores.forEach(store => {
                const last = getLastMsg(store.seller);
                const unread = getUnread(store.seller);
                const div = document.createElement("div");
                div.className = "contact" + (activeStore === store.seller ? " active" : "");
                div.innerHTML = `
            <div class="avatar av-seller" style="overflow:hidden;padding:0">
                ${store.photo ? `<img src="${store.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : store.name.substring(0,2).toUpperCase()}
            </div>
            <div class="contact-info">
                <div class="contact-name">${store.name}</div>
                <div class="contact-preview">${last ? last.text.substring(0,30) : "Start a conversation"}</div>
            </div>
            ${unread ? `<span class="unread">${unread}</span>` : ""}
        `;
                div.onclick = () => openChat(store);
                list.appendChild(div);
            });
        }

        function openChat(store) {
            activeStore = store.seller;
            // Mark messages as read
            const all = JSON.parse(localStorage.getItem("messages")) || [];
            all.forEach(m => {
                if (m.seller === store.seller && m.customer === currentCustomer && m.from === "seller") {
                    m.read = true;
                }
            });
            localStorage.setItem("messages", JSON.stringify(all));
            renderSidebar();
            const chatArea = document.getElementById("chat-area");
            chatArea.innerHTML = `
        <div class="chat-header">
            <div class="avatar av-seller" style="width:28px;height:28px;overflow:hidden;padding:0">
                ${store.photo ? `<img src="${store.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : store.name.substring(0,2).toUpperCase()}
            </div>
            <div>
                <div class="chat-header-name">${store.name}</div>
                <div class="chat-header-status">Store</div>
            </div>
        </div>
        <div class="messages" id="msg-list"></div>
        <div class="input-area">
            <textarea class="msg-input" id="msg-input" placeholder="Type a message..." onkeydown="handleKey(event)"></textarea>
            <button class="send-btn" onclick="sendMsg()">Send</button>
        </div>
    `;
            renderMessages(store.seller);
        }

        function renderMessages(sellerUsername) {
            const seller = sellerUsername || activeStore;
            const list = document.getElementById("msg-list");
            if (!list) return;
            const all = JSON.parse(localStorage.getItem("messages")) || [];
            const msgs = all.filter(m => m.seller === seller && m.customer === currentCustomer);
            list.innerHTML = "";
            msgs.forEach(m => {
                const isSent = m.from === "customer";
                const div = document.createElement("div");
                div.className = "msg " + (isSent ? "sent" : "received");
                div.innerHTML = `<div>${m.text}</div><div class="msg-time">${m.time}</div>`;
                list.appendChild(div);
            });
            list.scrollTop = list.scrollHeight;
        }

        function sendMsg() {
            const input = document.getElementById("msg-input");
            if (!input || !input.value.trim() || !activeStore) return;
            const text = input.value.trim();
            const all = JSON.parse(localStorage.getItem("messages")) || [];
            all.push({
                seller: activeStore,
                customer: currentCustomer,
                from: "customer",
                text: text,
                time: getTime(),
                read: false
            });
            localStorage.setItem("messages", JSON.stringify(all));
            input.value = "";
            renderSidebar();
            renderMessages();
        }

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMsg();
            }
        }

        function getTime() {
            const d = new Date();
            let h = d.getHours(),
                m = d.getMinutes(),
                ap = h >= 12 ? "PM" : "AM";
            h = h % 12 || 12;
            return h + ":" + (m < 10 ? "0" + m : m) + " " + ap;
        }

        function goBack() {
            window.location.href = "foruzer.html";
        }
        // Auto-refresh every 3 seconds
        setInterval(() => {
            renderSidebar();
            if (activeStore) renderMessages();
        }, 3000);
        renderSidebar();

    </script>
</body>

</html>
