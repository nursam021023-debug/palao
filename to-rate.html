<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Rate</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4ff;
            color: #2d2d2d;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #4a2080 0%, #6a35a8 60%, #8b5fcf 100%);
            padding: 20px 20px 28px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '⭐';
            position: absolute;
            right: -10px;
            top: -10px;
            font-size: 90px;
            opacity: .07;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 20px;
            background: #f0f4ff;
            border-radius: 20px 20px 0 0;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.12);
            border: none;
            border-radius: 10px;
            color: #fff;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: background .15s;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        .header-title-wrap {
            flex: 1;
        }

        .header-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-count {
            background: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        /* ── SEARCH ── */
        .search-wrap {
            margin: 0 20px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 1px solid #dde3ef;
            border-radius: 12px;
            padding: 10px 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .07);
        }

        .search-wrap svg {
            color: #aaa;
            flex-shrink: 0;
        }

        .search-wrap input {
            border: none;
            outline: none;
            flex: 1;
            font-size: 14px;
            background: transparent;
            color: #333;
        }

        /* ── NOTICE ── */
        .notice-banner {
            margin: 0 20px 14px;
            background: linear-gradient(135deg, #ede0ff, #f5f0ff);
            border: 1.5px solid #c4adeb;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .notice-icon {
            font-size: 20px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .notice-text {
            font-size: 12px;
            color: #432874;
            line-height: 1.5;
        }

        .notice-text strong {
            display: block;
            margin-bottom: 2px;
            font-size: 13px;
        }

        /* ── ORDER LIST ── */
        .order-list {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 52px;
            margin-bottom: 12px;
        }

        .empty-title {
            font-size: 17px;
            font-weight: 700;
            color: #5a6a8a;
            margin-bottom: 6px;
        }

        .empty-sub {
            font-size: 13px;
            color: #aaa;
        }

        /* ── ORDER CARD ── */
        .order-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #ddd6f3;
            box-shadow: 0 3px 12px rgba(74, 32, 128, .08);
            overflow: hidden;
            animation: fadeUp .25s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px 8px;
            border-bottom: 1px solid #f0f3fb;
            background: #faf8ff;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
        }

        .type-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: .3px;
        }

        .badge-order {
            background: #e8f0fe;
            color: #3a5fcf;
        }

        .badge-reserve {
            background: #fff3e0;
            color: #b05e00;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #e2d9f3;
            color: #432874;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #6a35a8;
            animation: pulse 1.6s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: .5;
                transform: scale(.7);
            }
        }

        .card-date {
            font-size: 11px;
            color: #bbb;
            white-space: nowrap;
        }

        .card-body {
            display: flex;
            gap: 12px;
            padding: 14px 16px 12px;
        }

        .item-img {
            width: 72px;
            height: 72px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid #eee;
            background: #f4f4f4;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-detail {
            font-size: 12px;
            color: #777;
            margin-top: 3px;
        }

        .item-price {
            color: #1a7a4a;
            font-weight: 700;
        }

        .seller-row {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        /* ── RATING SECTION ── */
        .rating-section {
            border-top: 1px solid #f0f3fb;
            padding: 14px 16px 16px;
            background: #fdf9ff;
        }

        .rating-label {
            font-size: 11px;
            font-weight: 700;
            color: #6a35a8;
            text-transform: uppercase;
            letter-spacing: .6px;
            margin-bottom: 10px;
        }

        /* Stars */
        .stars-wrap {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
        }

        .star {
            font-size: 34px;
            cursor: pointer;
            color: #ddd;
            transition: color .12s, transform .1s;
            user-select: none;
            line-height: 1;
        }

        .star.lit {
            color: #f5a623;
        }

        .star:hover {
            transform: scale(1.15);
        }

        .star:active {
            transform: scale(.88);
        }

        .star-hint {
            font-size: 12px;
            color: #9a72c8;
            font-weight: 600;
            margin-bottom: 10px;
            min-height: 18px;
        }

        .comment-input {
            width: 100%;
            border: 1.5px solid #ddd6f3;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            font-family: 'Segoe UI', sans-serif;
            resize: none;
            outline: none;
            color: #333;
            background: #fff;
            transition: border-color .15s;
            min-height: 72px;
        }

        .comment-input:focus {
            border-color: #8b5fcf;
        }

        .comment-input::placeholder {
            color: #bbb;
        }

        .btn-rate {
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            border-radius: 11px;
            border: none;
            background: linear-gradient(135deg, #4a2080, #8b5fcf);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: opacity .15s, transform .1s;
        }

        .btn-rate:hover {
            opacity: .88;
        }

        .btn-rate:active {
            transform: scale(.97);
        }

        .btn-rate:disabled {
            background: #c4b8d8;
            cursor: not-allowed;
            opacity: 1;
            transform: none;
        }

        /* Already rated */
        .rated-wrap {
            background: #edf7f0;
            border: 1.5px solid #a3d7ae;
            border-radius: 12px;
            padding: 12px 14px;
        }

        .rated-top {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .rated-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #2a7d4f;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .rated-title {
            font-size: 13px;
            font-weight: 700;
            color: #155724;
        }

        .rated-stars {
            color: #f5a623;
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .rated-comment {
            font-size: 12px;
            color: #3a7a50;
            font-style: italic;
            line-height: 1.5;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: #4a2080;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .2);
            transition: transform .3s ease, opacity .3s ease;
            opacity: 0;
            z-index: 999;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

    </style>
</head>

<body>
    <!-- HEADER -->
    <div class="header">
        <div class="header-top">
            <button class="back-btn" onclick="goBack()">&#8592;</button>
            <div class="header-title-wrap">
                <div class="header-label">My Orders</div>
                <div class="header-title">⭐ To Rate</div>
            </div>
            <span class="header-count" id="orderCount">0 orders</span>
        </div>
    </div>
    <!-- SEARCH -->
    <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="searchInput" placeholder="Search item or seller..." oninput="renderOrders()">
    </div>
    <!-- NOTICE -->
    <div class="notice-banner">
        <div class="notice-icon">⭐</div>
        <div class="notice-text">
            <strong>Rate the item you received!</strong> Choose a rate and leave a comment to help other buyers and the seller.
        </div>
    </div>
    <!-- ORDER LIST -->
    <div class="order-list" id="orderList"></div>
    <!-- TOAST -->
    <div class="toast" id="toast"></div>
    <script>
        const currentCustomer = localStorage.getItem("currentCustomer");
        if (!currentCustomer) {
            alert("Please login first.");
            window.location.href = "login.html";
        }
        const STAR_LABELS = ["", "Bad 😞", "Okay 😐", "Good 😊", "Very Good 😍", "Super Very Good 🤩"];
        // ── GET ORDERS ──
        function getToRateOrders() {
            const orders = JSON.parse(localStorage.getItem("orders_" + currentCustomer)) || [];
            const reservations = JSON.parse(localStorage.getItem("reservations_" + currentCustomer)) || [];
            let result = [];
            orders.forEach((o, idx) => {
                if (o.status === "to-rate") result.push({
                    ...o,
                    _idx: idx,
                    _type: "order"
                });
            });
            reservations.forEach((r, idx) => {
                if (r.status === "to-rate") result.push({
                    ...r,
                    _idx: idx,
                    _type: "reservation"
                });
            });
            return result;
        }
        // ── RENDER ──
        function renderOrders() {
            const query = document.getElementById("searchInput").value.trim().toLowerCase();
            const raw = getToRateOrders();
            const countEl = document.getElementById("orderCount");
            const list = document.getElementById("orderList");
            countEl.innerText = raw.length + (raw.length === 1 ? " order" : " orders");
            let orders = raw;
            if (query) {
                orders = orders.filter(o => (o.name && o.name.toLowerCase().includes(query)) || (o.seller && o.seller.toLowerCase().includes(query)));
            }
            list.innerHTML = "";
            if (orders.length === 0) {
                list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⭐</div>
                    <div class="empty-title">Nothing to rate yet</div>
                    <div class="empty-sub">The items you received will appear there for you to rate.</div>
                </div>`;
                return;
            }
            orders.forEach((order, i) => {
                const card = document.createElement("div");
                card.className = "order-card";
                card.style.animationDelay = (i * 0.06) + "s";
                const isReserve = order._type === "reservation";
                const date = order.receivedAt || order.paidAt || order.createdAt || order.date || "";
                const displayDate = date ? new Date(date).toLocaleDateString("en-PH", {
                    year: "numeric",
                    month: "short",
                    day: "numeric"
                }) : "—";
                const totalPrice = (parseFloat(order.price || 0) * (order.qty || 1)).toFixed(0);
                const storeName = getStoreName(order.seller);
                const alreadyRated = order.rating && order.rating > 0;
                let ratingSectionHTML = "";
                if (alreadyRated) {
                    const filledStars = "★".repeat(order.rating);
                    const emptyStars = "☆".repeat(5 - order.rating);
                    ratingSectionHTML = `
                    <div class="rated-wrap">
                        <div class="rated-top">
                            <div class="rated-check">✓</div>
                            <div class="rated-title">You already rated this! ${STAR_LABELS[order.rating]}</div>
                        </div>
                        <div class="rated-stars">${filledStars}${emptyStars}</div>
                        ${order.ratingComment
                            ? `<div class="rated-comment">"${escDisplay(order.ratingComment)}"</div>`
                            : ""}
                    </div>`;
                } else {
                    ratingSectionHTML = `
                    <div class="stars-wrap" id="stars_${i}">
                        <span class="star" data-val="1">★</span>
                        <span class="star" data-val="2">★</span>
                        <span class="star" data-val="3">★</span>
                        <span class="star" data-val="4">★</span>
                        <span class="star" data-val="5">★</span>
                    </div>
                    <div class="star-hint" id="hint_${i}">Select a Rate...</div>
                    <textarea class="comment-input" id="comment_${i}"
                        placeholder="Write  your experience with this product (optional)..."
                        maxlength="300"></textarea>
                    <button class="btn-rate" id="rateBtn_${i}"
                        onclick="submitRating(${order._idx}, '${order._type}', ${i})"
                        disabled>
                        ⭐ Submit your Rating
                    </button>`;
                }
                card.innerHTML = `
                <div class="card-top">
                    <div class="card-meta">
                        <span class="type-badge ${isReserve ? 'badge-reserve' : 'badge-order'}">
                            ${isReserve ? '📅 Reservation' : '🛒 Order'}
                        </span>
                        <span class="status-pill">
                            <span class="status-dot"></span>
                            To Rate
                        </span>
                    </div>
                    <span class="card-date">${displayDate}</span>
                </div>
 
                <div class="card-body">
                    <img class="item-img" src="${order.image || ''}" alt="${order.name || ''}">
                    <div class="item-info">
                        <div class="item-name">${order.name || '—'}</div>
                        <div class="item-detail">
                            Size: <strong>${order.size || '—'}</strong> &nbsp;|&nbsp;
                            Qty: <strong>${order.qty || 1}</strong>
                        </div>
                        <div class="item-detail">
                            Total: <span class="item-price">&#8369;${totalPrice}</span>
                        </div>
                        <div class="seller-row">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                <polyline points="9 22 9 12 15 12 15 22"/>
                            </svg>
                            ${storeName || order.seller || '—'}
                        </div>
                    </div>
                </div>
 
                <div class="rating-section">
                    <div class="rating-label">Rate the product</div>
                    ${ratingSectionHTML}
                </div>
            `;
                list.appendChild(card);
                if (!alreadyRated) initStars(i);
            });
        }
        // ── STAR LOGIC ──
        const selectedStars = {};

        function initStars(cardIdx) {
            const wrap = document.getElementById("stars_" + cardIdx);
            const hint = document.getElementById("hint_" + cardIdx);
            const btn = document.getElementById("rateBtn_" + cardIdx);
            if (!wrap) return;
            const stars = wrap.querySelectorAll(".star");
            stars.forEach(star => {
                const val = parseInt(star.getAttribute("data-val"));
                star.addEventListener("mouseover", () => {
                    stars.forEach(s => s.classList.toggle("lit", parseInt(s.getAttribute("data-val")) <= val));
                    if (hint) hint.innerText = STAR_LABELS[val] || "";
                });
                star.addEventListener("mouseout", () => {
                    const sel = selectedStars[cardIdx] || 0;
                    stars.forEach(s => s.classList.toggle("lit", parseInt(s.getAttribute("data-val")) <= sel));
                    if (hint) hint.innerText = sel ? STAR_LABELS[sel] : "Choose to Rate...";
                });
                star.addEventListener("click", () => {
                    selectedStars[cardIdx] = val;
                    stars.forEach(s => s.classList.toggle("lit", parseInt(s.getAttribute("data-val")) <= val));
                    if (hint) hint.innerText = STAR_LABELS[val] || "";
                    if (btn) btn.disabled = false;
                });
            });
        }
        // ── SUBMIT RATING ──
        function submitRating(orderIdx, type, cardIdx) {
            const rating = selectedStars[cardIdx];
            if (!rating) {
                showToast("⚠️ Choose to Rate!");
                return;
            }
            const commentEl = document.getElementById("comment_" + cardIdx);
            const comment = (commentEl ? commentEl.value : "").trim();
            if (type === "order") {
                const orders = JSON.parse(localStorage.getItem("orders_" + currentCustomer)) || [];
                if (orders[orderIdx]) {
                    orders[orderIdx].rating = rating;
                    orders[orderIdx].ratingComment = comment;
                    orders[orderIdx].ratedAt = new Date().toISOString();
                    localStorage.setItem("orders_" + currentCustomer, JSON.stringify(orders));
                    saveRatingToSeller(orders[orderIdx].seller, orders[orderIdx].name, rating, comment);
                }
            } else {
                const reservations = JSON.parse(localStorage.getItem("reservations_" + currentCustomer)) || [];
                if (reservations[orderIdx]) {
                    reservations[orderIdx].rating = rating;
                    reservations[orderIdx].ratingComment = comment;
                    reservations[orderIdx].ratedAt = new Date().toISOString();
                    localStorage.setItem("reservations_" + currentCustomer, JSON.stringify(reservations));
                    saveRatingToSeller(reservations[orderIdx].seller, reservations[orderIdx].name, rating, comment);
                }
            }
            showToast("⭐ Your Rate has been submitted! Thanks.");
            setTimeout(() => renderOrders(), 600);
        }
        // ── SAVE TO SELLER ──
        function saveRatingToSeller(sellerUsername, productName, rating, comment) {
            if (!sellerUsername) return;
            const key = "sellerRatings_" + sellerUsername;
            const ratings = JSON.parse(localStorage.getItem(key)) || [];
            ratings.push({
                customer: currentCustomer,
                productName: productName,
                rating: rating,
                comment: comment,
                date: new Date().toISOString()
            });
            localStorage.setItem(key, JSON.stringify(ratings));
            // Update average in sellerProfile
            const profile = JSON.parse(localStorage.getItem("sellerProfile_" + sellerUsername)) || {};
            const total = ratings.reduce((sum, r) => sum + r.rating, 0);
            profile.averageRating = (total / ratings.length).toFixed(1);
            profile.totalRatings = ratings.length;
            localStorage.setItem("sellerProfile_" + sellerUsername, JSON.stringify(profile));
        }
        // ── HELPERS ──
        function getStoreName(seller) {
            const stores = JSON.parse(localStorage.getItem("stores")) || [];
            const store = stores.find(s => s.seller === seller);
            return store ? store.name : (seller || "—");
        }

        function escDisplay(val) {
            return (val || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 2800);
        }
        window.addEventListener("storage", function(e) {
            if (e.key === "orders_" + currentCustomer || e.key === "reservations_" + currentCustomer) renderOrders();
        });

        function goBack() {
            window.location.href = "customer-profile.html";
        }
        renderOrders();

    </script>
</body>

</html>
